services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-origo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB:-origo}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-origo}"]
      interval: 10s
      timeout: 5s
      retries: 10
    # DB is NOT exposed publicly — only reachable by other containers

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: always
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-origo}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-origo}
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"
    # No port exposure — accessed only through nginx

  web:
    build:
      context: ./web
      dockerfile: Dockerfile.prod
    restart: always
    ports:
      - "80:80"
    environment:
      API_HOST: api:8000   # matches the api service name in this compose file
    depends_on:
      - api

volumes:
  postgres_data:
