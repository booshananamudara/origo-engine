# Origo Engine — Local Development (7-service architecture)
#
# Mirrors the target Railway deployment. Each service is isolated with only
# the credentials it needs.
#
# Quick start:
#   docker compose up --build
#
# Credentials come from the root .env file. Docker Compose reads .env
# automatically for ${VAR} interpolation throughout this file.
# Required keys: POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB
#
# Access points:
#   admin-api  → http://localhost:8001  (/admin/* routes)
#   client-api → http://localhost:8002  (/client/* routes)
#   admin-web  → http://localhost:5174  (admin frontend)
#   client-web → http://localhost:5173  (client frontend)
#   worker     → no HTTP port (background scheduler)

services:

  # ── Infrastructure ────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      # Interpolated from root .env — must match DATABASE_URL below
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-origo}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Create application roles on first container start
      - ./scripts/init-db-roles.sql:/docker-entrypoint-initdb.d/01-roles.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Admin API ─────────────────────────────────────────────────────────────
  # Connects as origo_admin (BYPASSRLS). Runs migrations on startup.
  # Serves /admin/* routes. Runs inline scheduler.
  admin-api:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: admin-api
    restart: unless-stopped
    env_file: .env
    environment:
      SERVICE_ROLE: admin
      SCHEDULER_ENABLED: "true"
      # Superuser URL for migrations — credentials must match db service above
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-origo}
      # Admin role for runtime queries (BYPASSRLS)
      DATABASE_URL_ADMIN: postgresql+asyncpg://origo_admin:origo_admin_dev@db:5432/${POSTGRES_DB:-origo}
      REDIS_URL: redis://redis:6379
      ADMIN_FRONTEND_URL: http://localhost:5174
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Client API ────────────────────────────────────────────────────────────
  # Connects as origo_app (RLS enforced). No migrations. No scheduler.
  # Serves /client/* routes only.
  # CRITICAL: receives NO DATABASE_URL or DATABASE_URL_ADMIN credentials.
  client-api:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: client-api
    restart: unless-stopped
    env_file: .env
    environment:
      SERVICE_ROLE: client
      SCHEDULER_ENABLED: "false"
      # App role ONLY — origo_app is subject to RLS
      DATABASE_URL_APP: postgresql+asyncpg://origo_app:origo_app_dev@db:5432/${POSTGRES_DB:-origo}
      # No DATABASE_URL (superuser) — this service cannot run migrations
      # No DATABASE_URL_ADMIN — this service cannot bypass RLS
      REDIS_URL: redis://redis:6379
      CLIENT_FRONTEND_URL: http://localhost:5173
    ports:
      - "8002:8000"
    depends_on:
      admin-api:
        # Wait for admin-api to finish migrations first
        condition: service_started
      redis:
        condition: service_healthy

  # ── Worker ────────────────────────────────────────────────────────────────
  # arq-based background worker. Runs scheduled pipeline jobs.
  # Connects as origo_admin (needs cross-client access to iterate all clients).
  # No HTTP port — communicates via Redis job queue.
  worker:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: worker
    restart: unless-stopped
    env_file: .env
    environment:
      SERVICE_ROLE: worker
      SCHEDULER_ENABLED: "false"
      # Admin role — worker needs to iterate all clients for scheduling
      DATABASE_URL_ADMIN: postgresql+asyncpg://origo_admin:origo_admin_dev@db:5432/${POSTGRES_DB:-origo}
      REDIS_URL: redis://redis:6379
    depends_on:
      admin-api:
        condition: service_started
      redis:
        condition: service_healthy

  # ── Admin Frontend ────────────────────────────────────────────────────────
  admin-web:
    build:
      context: ./admin-frontend
      dockerfile: Dockerfile
      args:
        # Baked into the JS bundle at build time by Vite
        VITE_API_URL: http://localhost:8001
    restart: unless-stopped
    ports:
      - "5174:80"
    environment:
      # nginx envsubst fills these into nginx.conf.template at container start
      PORT: "80"
      API_HOST: http://admin-api:8000
    depends_on:
      - admin-api

  # ── Client Frontend ───────────────────────────────────────────────────────
  client-web:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./web:/app
      - /app/node_modules
    environment:
      # Points to client-api — browser hits host port 8002 directly
      VITE_API_URL: http://localhost:8002
    depends_on:
      - client-api

volumes:
  postgres_data:
