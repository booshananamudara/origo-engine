server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # Shared proxy config — used by both /api/ and /client/ locations
    # API_HOST is injected at container start via envsubst (nginx templates feature).
    # Railway: API_HOST=https://origo-api-production.up.railway.app

    # Proxy /api/* → FastAPI backend (strips /api prefix)
    location /api/ {
        proxy_pass         ${API_HOST}/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header   Host              $proxy_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Proxy /client/* → FastAPI backend (preserves /client/ prefix)
    # Used by: /client/auth/login, /client/auth/me, /client/dashboard/*
    location /client/ {
        proxy_pass         ${API_HOST}/client/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header   Host              $proxy_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # React SPA — all other routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
